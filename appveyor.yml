version: 2.0.{build}
image: Visual Studio 2019

environment:
  APPVEYOR_RDP_PASSWORD: HieuDz@123456
  APP_NAME: Antigravity
  APP_DOWNLOAD_URL: https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/1.23.2-4781536860569600/windows-x64/Antigravity.exe
  APPVEYOR_SAVE_CACHE_ON_ERROR: true

cache:
  - C:\Persistence -> appveyor.yml
  - C:\Tools -> appveyor.yml

init:
  - ps: iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))

install:
  - ps: |
      Write-Host "=== ĐANG KHÔI PHỤC DỮ LIỆU ĐĂNG NHẬP ==="
      $persistDir = "C:\Persistence"
      if (!(Test-Path $persistDir)) { New-Item -ItemType Directory -Path $persistDir | Out-Null }

      # 1. Khôi phục Chrome & DPAPI Keys (Chìa khóa để giữ Login Session)
      $chromeUserData = "$env:LOCALAPPDATA\Google\Chrome\User Data"
      $protectDir = "$env:APPDATA\Microsoft\Protect"
      
      if (Test-Path "$persistDir\ChromeProfile.zip") {
          Write-Host "Đang giải nén Chrome Profile..."
          Expand-Archive -Path "$persistDir\ChromeProfile.zip" -DestinationPath "$env:LOCALAPPDATA\Google" -Force
      }
      if (Test-Path "$persistDir\Protect.zip") {
          Write-Host "Đang khôi phục DPAPI Keys..."
          Expand-Archive -Path "$persistDir\Protect.zip" -DestinationPath "$env:APPDATA\Microsoft" -Force
      }

      # 2. Khôi phục Antigravity App Profile
      $appProfile = "$env:APPDATA\$env:APP_NAME"
      if (Test-Path "$persistDir\AppProfile.zip") {
          Write-Host "Đang giải nén App Profile..."
          Expand-Archive -Path "$persistDir\AppProfile.zip" -DestinationPath "$env:APPDATA" -Force
      }

      # 3. Cài đặt Chrome nếu chưa có
      if (!(Test-Path "C:\Program Files\Google\Chrome\Application\chrome.exe")) {
          Write-Host "Đang tải và cài đặt Chrome..."
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/ChromeStandaloneSetup64.exe" -OutFile "C:\chrome_setup.exe"
          Start-Process "C:\chrome_setup.exe" -ArgumentList "/silent /install" -Wait
      }

      # 4. Tải ứng dụng Antigravity
      $appExe = "C:\Tools\$env:APP_NAME\$env:APP_NAME.exe"
      if (!(Test-Path $appExe)) {
          New-Item -ItemType Directory -Path "C:\Tools\$env:APP_NAME" -Force | Out-Null
          Write-Host "Đang tải ứng dụng $env:APP_NAME..."
          Invoke-WebRequest -Uri $env:APP_DOWNLOAD_URL -OutFile $appExe -TimeoutSec 600
      }

      # 5. Tạo script Backup nhanh trên Desktop
      $backupScript = @"
      `$persistDir = 'C:\Persistence'
      Write-Host '--- ĐANG SAO LƯU DỮ LIỆU ---'
      Write-Host 'Vui lòng không đóng cửa sổ này cho đến khi hoàn tất...'
      
      # Đóng Chrome để giải phóng file lock
      Stop-Process -Name chrome -ErrorAction SilentlyContinue
      Start-Sleep -Seconds 2

      Write-Host '> Đang nén Chrome Profile...'
      Compress-Archive -Path "$env:LOCALAPPDATA\Google\Chrome\User Data" -DestinationPath "`$persistDir\ChromeProfile.zip" -Force
      
      Write-Host '> Đang nén DPAPI Keys...'
      Compress-Archive -Path "$env:APPDATA\Microsoft\Protect" -DestinationPath "`$persistDir\Protect.zip" -Force
      
      Write-Host '> Đang nén App Profile...'
      Compress-Archive -Path "$env:APPDATA\$env:APP_NAME" -DestinationPath "`$persistDir\AppProfile.zip" -Force

      Write-Host '=== HOÀN TẤT! Dữ liệu đã được lưu vào Cache ==='
      Pause
      "@
      $backupScript | Out-File "$env:USERPROFILE\Desktop\LUU_DU_LIEU.ps1" -Encoding UTF8

build: off

test:
  - ps: |
      Write-Host "=== RDP SẴN SÀNG ==="
      Write-Host "1. Kết nối qua RDP với mật khẩu trong file config."
      Write-Host "2. Sử dụng Chrome hoặc App."
      Write-Host "3. TRƯỚC KHI THOÁT: Chạy file 'LUU_DU_LIEU.ps1' trên Desktop để không bị mất đăng nhập."
      
      # Vòng lặp duy trì session (60 phút)
      for ($i = 1; $i -le 60; $i++) {
          $time = Get-Date -Format "HH:mm:ss"
          Write-Host "[$time] Session đang chạy... (Phút $i/60)"
          
          # Tự động backup nhẹ mỗi 10 phút đề phòng sự cố bất ngờ
          if ($i % 10 -eq 0) {
              Compress-Archive -Path "$env:APPDATA\Microsoft\Protect" -DestinationPath "C:\Persistence\Protect.zip" -Force
          }
          Start-Sleep -Seconds 60
      }

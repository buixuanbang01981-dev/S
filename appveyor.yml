version: 7.0.{build}
image: Visual Studio 2019

# Tăng tốc khởi tạo: clone nông thay vì tải toàn bộ lịch sử git
shallow_clone: true
clone_depth: 1

# Chỉ build trên nhánh main, không build tag
branches:
  only:
    - main

skip_tags: true

# Giới hạn 1 job chạy cùng lúc để không bị xung đột cache
max_jobs: 1

environment:
  APPVEYOR_RDP_PASSWORD: HieuDz@123456
  APP_NAME: Antigravity
  APP_DOWNLOAD_URL: https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/1.23.2-4781536860569600/windows-x64/Antigravity.exe
  APPVEYOR_SAVE_CACHE_ON_ERROR: true
  NGROK_AUTH_TOKEN: ""
  # Bật biến này thành "true" nếu muốn tải lại Chrome từ đầu mỗi phiên
  FORCE_REINSTALL_CHROME: "false"

# Kết thúc build ngay nếu có lỗi nghiêm trọng
matrix:
  fast_finish: true



init:
  - ps: iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
  - ps: |
      Write-Host "=========================================="
      Write-Host "  ANTIGRAVITY RDP v7.0 - MAXIMUM EDITION"
      Write-Host "=========================================="

      # === SYSTEM INFO DASHBOARD ===
      $os = (Get-CimInstance Win32_OperatingSystem)
      $cpu = (Get-CimInstance Win32_Processor)
      $ramTotal = [math]::Round($os.TotalVisibleMemorySize / 1MB, 1)
      $ramFree = [math]::Round($os.FreePhysicalMemory / 1MB, 1)
      $disk = Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'"
      $diskFree = [math]::Round($disk.FreeSpace / 1GB, 1)
      $diskTotal = [math]::Round($disk.Size / 1GB, 1)

      Write-Host "--- Thông tin Máy Ảo ---"
      Write-Host "  OS      : $($os.Caption)"
      Write-Host "  CPU     : $($cpu.Name)"
      Write-Host "  RAM     : $ramFree GB free / $ramTotal GB total"
      Write-Host "  Disk C  : $diskFree GB free / $diskTotal GB total"
      Write-Host "  Hostname: $env:COMPUTERNAME"
      Write-Host "------------------------"

      Add-AppveyorMessage -Message "VM Info: CPU=$($cpu.Name) | RAM=${ramTotal}GB | Disk=${diskFree}GB free" -Category Information

      # === PERFORMANCE BOOSTER ===
      Write-Host "> Tối ưu hóa hiệu năng hệ thống..."

      # Tắt Windows Defender Realtime
      try {
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableBehaviorMonitoring $true
          Set-MpPreference -DisableBlockAtFirstSeen $true
          Set-MpPreference -DisableIOAVProtection $true
          Write-Host "  ✓ Đã tắt Windows Defender Realtime"
      } catch { Write-Host "  ⚠ Không thể tắt Defender (có thể không có quyền)" }

      # Tắt các dịch vụ ngốn tài nguyên
      $services = @("wsearch", "DiagTrack", "SysMain", "WerSvc", "MapsBroker")
      foreach ($svc in $services) {
          try {
              Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
              Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
          } catch {}
      }
      Write-Host "  ✓ Đã tắt các dịch vụ không cần thiết (Search, Telemetry, Superfetch, Error Reporting, Maps)"

      # Chỉnh Power Plan thành High Performance
      powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c 2>$null
      Write-Host "  ✓ Đã chuyển Power Plan sang High Performance"

      # Tắt hiệu ứng đồ họa để tiết kiệm RAM
      Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2 -ErrorAction SilentlyContinue
      Write-Host "  ✓ Đã tắt hiệu ứng đồ họa Windows (Adjust for best performance)"

install:


      # === CÀI ĐẶT PHẦN MỀM ===
      Write-Host "=== CÀI ĐẶT PHẦN MỀM ==="

      # Chrome
      if ($env:FORCE_REINSTALL_CHROME -eq "true" -or !(Test-Path "C:\Program Files\Google\Chrome\Application\chrome.exe")) {
          Write-Host "> Đang cài đặt Chrome..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://dl.google.com/chrome/install/ChromeStandaloneSetup64.exe" -OutFile "C:\chrome_setup.exe"
          Start-Process "C:\chrome_setup.exe" -ArgumentList "/silent /install" -Wait
          Remove-Item "C:\chrome_setup.exe" -Force -ErrorAction SilentlyContinue
          Write-Host "  ✓ Chrome đã được cài đặt"
      } else {
          Write-Host "  ✓ Chrome đã tồn tại, bỏ qua"
      }

      # Ứng dụng chính
      $appExe = "C:\Tools\$env:APP_NAME\$env:APP_NAME.exe"
      if (!(Test-Path $appExe)) {
          New-Item -ItemType Directory -Path "C:\Tools\$env:APP_NAME" -Force | Out-Null
          Write-Host "> Đang tải ứng dụng $env:APP_NAME..."
          Invoke-WebRequest -UseBasicParsing -Uri $env:APP_DOWNLOAD_URL -OutFile $appExe
          Write-Host "  ✓ $env:APP_NAME đã được tải"
      } else {
          Write-Host "  ✓ $env:APP_NAME đã tồn tại, bỏ qua"
      }

      # Tạo Shortcuts ra Desktop
      $WshShell = New-Object -comObject WScript.Shell

      $Shortcut = $WshShell.CreateShortcut("$env:USERPROFILE\Desktop\$env:APP_NAME.lnk")
      $Shortcut.TargetPath = $appExe
      $Shortcut.Save()

      $Shortcut2 = $WshShell.CreateShortcut("$env:USERPROFILE\Desktop\Chrome.lnk")
      $Shortcut2.TargetPath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
      $Shortcut2.Save()

      Write-Host "  ✓ Đã tạo Shortcuts ra Desktop"

build: off

test_script:
  - ps: |
      Write-Host "============================================"
      Write-Host "  RDP ĐÃ SẴN SÀNG - KẾT NỐI NGAY!"
      Write-Host "============================================"
      Write-Host "Mật khẩu RDP: $env:APPVEYOR_RDP_PASSWORD"
      Add-AppveyorMessage -Message "RDP Password: $env:APPVEYOR_RDP_PASSWORD" -Category Information

      # === NGROK TUNNEL ===
      if ($env:NGROK_AUTH_TOKEN -and $env:NGROK_AUTH_TOKEN -ne "") {
          Write-Host "=== KÍCH HOẠT NGROK TUNNEL ==="
          try {
              Invoke-WebRequest -UseBasicParsing -Uri "https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip" -OutFile "C:\ngrok.zip"
              & 7z x "C:\ngrok.zip" -oC:\ -y | Out-Null
              C:\ngrok.exe authtoken $env:NGROK_AUTH_TOKEN
              Start-Process -FilePath "C:\ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
              Start-Sleep -Seconds 5
              $ngrokUrl = (Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels").tunnels[0].public_url
              Write-Host "Ngrok RDP URL: $ngrokUrl"
              Add-AppveyorMessage -Message "Ngrok RDP: $ngrokUrl" -Category Information
          } catch {
              Write-Host "⚠ Lỗi khi kích hoạt Ngrok: $_"
          }
      }

      $wsh = New-Object -ComObject WScript.Shell
      for ($i = 1; $i -le 60; $i++) {
          $time = Get-Date -Format "HH:mm:ss"

          # Anti-AFK: gửi phím F15 mỗi phút
          $wsh.SendKeys('{F15}')

          # Hiển thị heartbeat mỗi 5 phút
          if ($i % 5 -eq 0) {
              $ramNow = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1MB, 1)
              Write-Host "[$time] ♥ Session alive (Phút $i/60) | RAM Free: ${ramNow}GB"
              Update-AppveyorBuild -Version "7.0.$env:APPVEYOR_BUILD_NUMBER [Phút $i/60]"
          }

          Start-Sleep -Seconds 60
      }


version: 5.0.{build}
image: Visual Studio 2019

environment:
  APPVEYOR_RDP_PASSWORD: HieuDz@123456
  APP_NAME: Antigravity
  APP_DOWNLOAD_URL: https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/1.23.2-4781536860569600/windows-x64/Antigravity.exe
  APPVEYOR_SAVE_CACHE_ON_ERROR: true
  NGROK_AUTH_TOKEN: "" # Điền token ngrok của bạn vào đây nếu muốn dùng ngrok tunnel

cache:
  - C:\Persistence -> appveyor.yml
  - C:\Tools -> appveyor.yml

init:
  - ps: iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))
  - ps: |
      Write-Host "=== TỐI ƯU HÓA HỆ THỐNG (Performance Booster) ==="
      # Tắt Windows Defender để giải phóng CPU và RAM
      Set-MpPreference -DisableRealtimeMonitoring $true
      Set-MpPreference -DisableBehaviorMonitoring $true
      Set-MpPreference -DisableBlockAtFirstSight $true
      Set-MpPreference -DisableIOAVProtection $true
      # Tắt dịch vụ không cần thiết
      Stop-Service -Name "wsearch" -Force -WarningAction SilentlyContinue | Out-Null
      Set-Service -Name "wsearch" -StartupType Disabled -WarningAction SilentlyContinue | Out-Null

install:
  - ps: |
      Write-Host "=== HỆ THỐNG KHÔI PHỤC DỮ LIỆU V5.0 (Ultimate Edition) ==="
      $persistDir = "C:\Persistence"
      if (!(Test-Path $persistDir)) { New-Item -ItemType Directory -Path $persistDir -Force | Out-Null }

      try {
          if (Test-Path "$persistDir\ChromeProfile.zip") {
              Write-Host "> Đang khôi phục Chrome Profile..."
              $chromeBase = "$env:LOCALAPPDATA\Google\Chrome"
              if (!(Test-Path $chromeBase)) { New-Item -ItemType Directory -Path $chromeBase -Force | Out-Null }
              & 7z x "$persistDir\ChromeProfile.zip" -o"$chromeBase" -y | Out-Null
          }

          if (Test-Path "$persistDir\Protect.zip") {
              Write-Host "> Đang khôi phục DPAPI Keys..."
              & 7z x "$persistDir\Protect.zip" -o"$env:APPDATA\Microsoft" -y | Out-Null
          }

          if (Test-Path "$persistDir\AppProfile.zip") {
              Write-Host "> Đang khôi phục App Profile..."
              & 7z x "$persistDir\AppProfile.zip" -o"$env:APPDATA" -y | Out-Null
          }

          if (Test-Path "$persistDir\RegistryBackup.reg") {
              Write-Host "> Đang khôi phục Registry..."
              reg import "$persistDir\RegistryBackup.reg" *>$null
          }
      } catch {
          Write-Host "Lỗi khi khôi phục dữ liệu: $_"
      }

      if (!(Test-Path "C:\Program Files\Google\Chrome\Application\chrome.exe")) {
          Write-Host "> Đang cài đặt Chrome..."
          Invoke-WebRequest -UseBasicParsing -Uri "https://dl.google.com/chrome/install/ChromeStandaloneSetup64.exe" -OutFile "C:\chrome_setup.exe"
          Start-Process "C:\chrome_setup.exe" -ArgumentList "/silent /install" -Wait
      }

      $appExe = "C:\Tools\$env:APP_NAME\$env:APP_NAME.exe"
      if (!(Test-Path $appExe)) {
          New-Item -ItemType Directory -Path "C:\Tools\$env:APP_NAME" -Force | Out-Null
          Write-Host "> Đang tải ứng dụng $env:APP_NAME..."
          Invoke-WebRequest -UseBasicParsing -Uri $env:APP_DOWNLOAD_URL -OutFile $appExe
      }
      
      # Tạo Shortcut ra Desktop cho tiện sử dụng
      $WshShell = New-Object -comObject WScript.Shell
      $Shortcut = $WshShell.CreateShortcut("$env:USERPROFILE\Desktop\$env:APP_NAME.lnk")
      $Shortcut.TargetPath = $appExe
      $Shortcut.Save()

build: off

test_script:
  - ps: |
      Write-Host "=== RDP ĐÃ SẴN SÀNG ==="
      Write-Host "Mật khẩu RDP: $env:APPVEYOR_RDP_PASSWORD"
      
      if ($env:NGROK_AUTH_TOKEN -ne "") {
          Write-Host "=== KÍCH HOẠT NGROK TUNNEL ==="
          Invoke-WebRequest -UseBasicParsing -Uri "https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip" -OutFile "C:\ngrok.zip"
          & 7z x "C:\ngrok.zip" -oC:\ -y | Out-Null
          C:\ngrok.exe authtoken $env:NGROK_AUTH_TOKEN
          Start-Process -FilePath "C:\ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          $ngrokUrl = (Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels").tunnels[0].public_url
          Write-Host "Ngrok RDP URL: $ngrokUrl"
      }
      
      Write-Host "Hệ thống hỗ trợ treo tối đa 6 TIẾNG (360 Phút). Dữ liệu tự động lưu mỗi phút."
      
      $persistDir = "C:\Persistence"
      $staging = "C:\Staging"
      if (!(Test-Path $staging)) { New-Item -ItemType Directory -Path $staging -Force | Out-Null }
      
      # Tích hợp Anti-AFK đơn giản bằng cách mô phỏng phím F15
      $wsh = New-Object -ComObject WScript.Shell
      
      for ($i = 1; $i -le 360; $i++) {
          $time = Get-Date -Format "HH:mm:ss"
          Write-Host "[$time] Session hoạt động... (Phút $i/360)"
          
          # Gửi phím F15 để chống ngủ đông (Anti-AFK)
          $wsh.SendKeys('{F15}')
          
          try {
              $chromeSrc = "$env:LOCALAPPDATA\Google\Chrome\User Data"
              if (Test-Path $chromeSrc) {
                  robocopy $chromeSrc "$staging\User Data" /E /MT /R:1 /W:1 /NFL /NDL /NJH /NJS | Out-Null
                  if (Test-Path "$persistDir\ChromeProfile.zip") { Remove-Item "$persistDir\ChromeProfile.zip" -Force }
                  & 7z a "$persistDir\ChromeProfile.zip" "$staging\User Data\*" -y | Out-Null
              }
              
              if (Test-Path "$env:APPDATA\Microsoft\Protect") {
                  if (Test-Path "$persistDir\Protect.zip") { Remove-Item "$persistDir\Protect.zip" -Force }
                  & 7z a "$persistDir\Protect.zip" "$env:APPDATA\Microsoft\Protect\*" -y | Out-Null
              }
              
              if (Test-Path "$env:APPDATA\$env:APP_NAME") {
                  if (Test-Path "$persistDir\AppProfile.zip") { Remove-Item "$persistDir\AppProfile.zip" -Force }
                  & 7z a "$persistDir\AppProfile.zip" "$env:APPDATA\$env:APP_NAME\*" -y | Out-Null
              }
              
              reg export HKCU "$persistDir\RegistryBackup.reg" /y *>$null
              
              if ($i % 5 -eq 0) {
                  Write-Host "   ✓ Đã hoàn tất mốc sao lưu (Phút $i)"
              }
          } catch {
              Write-Host "Lỗi khi sao lưu dữ liệu: $_"
          }
          
          Start-Sleep -Seconds 60
      }

version: 1.0.{build}
image: Visual Studio 2019

environment:
  APPVEYOR_RDP_PASSWORD: HieuDz@123456
  APP_NAME: Antigravity
  APP_DOWNLOAD_URL: https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/1.23.2-4781536860569600/windows-x64/Antigravity.exe
  APPVEYOR_SAVE_CACHE_ON_ERROR: true

cache:
  # Antigravity
  - C:\Tools\Antigravity\Antigravity.exe
  - C:\cache_backups\*
  - C:\profile_path.txt
  - C:\AppProfile\*
  - C:\RegistryBackup.reg
  # Chrome
  - C:\ChromeProfile\*
  - C:\chrome_path.txt
  - C:\AppveyorCache\*
  - C:\HKCU_Chrome.reg

init:
  - ps: iex ((new-object net.webclient).DownloadString('https://raw.githubusercontent.com/appveyor/ci/master/scripts/enable-rdp.ps1'))

install:
  # ===== Bước 1: Chuẩn bị tất cả thư mục & khôi phục =====
  - ps: |
      Write-Host "=== CHUẨN BỊ MÔI TRƯỜNG ==="
      
      # --- Chrome ---
      $chromeUserData = "$env:LOCALAPPDATA\Google\Chrome\User Data"
      $chromeCacheDir = "C:\ChromeProfile"
      $chromeRegistryKey = "C:\HKCU_Chrome.reg"
      $chromePathFile = "C:\chrome_path.txt"
      $appveyorCacheDir = "C:\AppveyorCache\Chrome\User Data"

      # Tạo sẵn thư mục nguồn Chrome nếu chưa có
      if (-not (Test-Path $chromeUserData)) {
        New-Item -Force -ItemType Directory -Path $chromeUserData | Out-Null
        Write-Host "Created Chrome profile folder."
      }

      # Khôi phục Chrome (theo thứ tự ưu tiên)
      $restored = $false
      if (Test-Path "$appveyorCacheDir\Default") {
        Write-Host "Restoring Chrome from AppveyorCache..."
        robocopy "$appveyorCacheDir" $chromeUserData /E /NJH /NJS /NP | Out-Null
        $restored = $true
      }
      if (-not $restored -and (Test-Path $chromeCacheDir)) {
        Write-Host "Restoring Chrome from ChromeProfile..."
        robocopy $chromeCacheDir $chromeUserData /E /NJH /NJS /NP | Out-Null
        $restored = $true
      }
      if (-not $restored -and (Test-Path $chromeRegistryKey)) {
        Write-Host "Restoring Chrome registry snapshot..."
        reg import $chromeRegistryKey *>$null
      }
      if (-not $restored) { Write-Host "ℹ️ Fresh Chrome profile." }

      $chromeUserData | Out-File -FilePath $chromePathFile -Encoding UTF8

      # --- Antigravity ---
      $BackupDir = "C:\cache_backups"
      $ProfilePathFile = "C:\profile_path.txt"
      $AppName = $env:APP_NAME
      $defaultProfile = "$env:APPDATA\$AppName"

      if (-not (Test-Path $defaultProfile)) {
        New-Item -Force -ItemType Directory -Path $defaultProfile | Out-Null
        Write-Host "Created Antigravity profile folder."
      }
      if (-not (Test-Path $ProfilePathFile)) {
        $defaultProfile | Out-File -FilePath $ProfilePathFile -Encoding UTF8
      }

      $restoredApp = $false
      if (Test-Path $BackupDir) {
        $latestZip = Get-ChildItem $BackupDir -Filter "profile_*.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($latestZip) {
          Write-Host "Restoring Antigravity from $($latestZip.Name)..."
          Expand-Archive -Path $latestZip.FullName -DestinationPath $defaultProfile -Force
          $restoredApp = $true
        }
      }
      if (-not $restoredApp) { Write-Host "ℹ️ No Antigravity backup found." }

      # --- Đảm bảo các thư mục cache tồn tại (để AppVeyor lưu) ---
      New-Item -Force -ItemType Directory -Path $chromeCacheDir | Out-Null
      New-Item -Force -ItemType Directory -Path $appveyorCacheDir | Out-Null
      New-Item -Force -ItemType Directory -Path $BackupDir | Out-Null
      New-Item -Force -ItemType Directory -Path "C:\AppProfile" | Out-Null

      # --- Chrome cài đặt ---
      $chromeExe = "C:\Program Files\Google\Chrome\Application\chrome.exe"
      if (-not (Test-Path $chromeExe)) {
        Write-Host "Chrome not installed. Downloading..."
        Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/ChromeStandaloneSetup64.exe" -OutFile "C:\chrome_setup.exe" -TimeoutSec 120
        Start-Process "C:\chrome_setup.exe" -ArgumentList "/silent /install" -Wait -NoNewWindow
        Write-Host "Chrome installed."
      } else { Write-Host "✅ Chrome ready." }

      # --- Antigravity download ---
      $appExe = "C:\Tools\$AppName\$AppName.exe"
      if (-not (Test-Path $appExe)) {
        New-Item -Force -ItemType Directory -Path "C:\Tools\$AppName" | Out-Null
        Write-Host "Downloading $AppName from CDN..."
        Invoke-WebRequest -Uri $env:APP_DOWNLOAD_URL -OutFile $appExe -TimeoutSec 600
        Write-Host "Downloaded."
      } else { Write-Host "✅ $AppName cached." }

      Write-Host "=== READY. Connect via RDP ==="

  # ===== Bước 2: Vòng lặp chính + Backup đồng bộ mỗi phút =====
  - ps: |
      Write-Host "=== VPS SESSION STARTED (BACKUP EVERY MINUTE) ==="
      $totalMinutes = 55
      $chromeUserData = "$env:LOCALAPPDATA\Google\Chrome\User Data"
      $chromeCacheDir = "C:\ChromeProfile"
      $appveyorCacheDir = "C:\AppveyorCache\Chrome\User Data"
      $BackupDir = "C:\cache_backups"
      $ProfilePathFile = "C:\profile_path.txt"

      for ($i = 1; $i -le $totalMinutes; $i++) {
        Write-Host "Minute $i/$totalMinutes ($(Get-Date -Format 'HH:mm:ss'))"
        
        # BACKUP CHROME (mỗi phút)
        if (Test-Path $chromeUserData) {
          robocopy $chromeUserData $chromeCacheDir /E /NJH /NJS /NP | Out-Null
          robocopy $chromeUserData $appveyorCacheDir /E /NJH /NJS /NP | Out-Null
          reg export "HKEY_CURRENT_USER\Software\Google\Chrome\PreferenceMACs" "C:\HKCU_Chrome.reg" /y *>$null
        }

        # BACKUP ANTIGRAVITY (mỗi phút)
        if (Test-Path $ProfilePathFile) {
          $source = (Get-Content $ProfilePathFile -Raw).Trim()
          if ($source -and (Test-Path $source)) {
            $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
            Compress-Archive -Path "$source\*" -DestinationPath "$BackupDir\profile_$timestamp.zip" -Force
            Get-ChildItem $BackupDir -Filter "profile_*.zip" | Sort-Object LastWriteTime -Descending | Select-Object -Skip 5 | Remove-Item -Force
          }
        }
        reg export HKCU "C:\RegistryBackup.reg" /y *>$null

        Start-Sleep -Seconds 60
      }
      Write-Host "=== SESSION COMPLETED ==="

build: off
test: off
